def calculate_fibonacci(n):
    sequence = [0, 1]

    while len(sequence) < n:
        next_val = sequence[-1] + sequence[-2]
        sequence.append(next_val)

    return sequence

n_terms = 10
result = calculate_fibonacci(n_terms)
print(f"The first {n_terms} terms: {result}")
